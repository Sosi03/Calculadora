<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Moderna</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <div class="calculator">
        <div class="display">
            <div class="previous-operand" id="previous-operand"></div>
            <div class="current-operand" id="current-operand">0</div>
        </div>
        <div class="buttons">
            <!-- Fila 1: Funciones especiales -->
            <button class="btn function" data-action="clear">C</button>
            <button class="btn function" data-action="delete">⌫</button>
            <button class="btn function" data-action="percentage">%</button>
            <button class="btn operator" data-action="operator" data-value="÷">÷</button>

            <!-- Fila 2: Números y operador -->
            <button class="btn number" data-action="number" data-value="7">7</button>
            <button class="btn number" data-action="number" data-value="8">8</button>
            <button class="btn number" data-action="number" data-value="9">9</button>
            <button class="btn operator" data-action="operator" data-value="×">×</button>

            <!-- Fila 3: Números y operador -->
            <button class="btn number" data-action="number" data-value="4">4</button>
            <button class="btn number" data-action="number" data-value="5">5</button>
            <button class="btn number" data-action="number" data-value="6">6</button>
            <button class="btn operator" data-action="operator" data-value="-">−</button>

            <!-- Fila 4: Números y operador -->
            <button class="btn number" data-action="number" data-value="1">1</button>
            <button class="btn number" data-action="number" data-value="2">2</button>
            <button class="btn number" data-action="number" data-value="3">3</button>
            <button class="btn operator" data-action="operator" data-value="+">+</button>

            <!-- Fila 5: Funciones especiales e igual -->
            <button class="btn function" data-action="negate">±</button>
            <button class="btn number" data-action="number" data-value="0">0</button>
            <button class="btn number" data-action="decimal" data-value=".">.</button>
            <button class="btn equals" data-action="calculate">=</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
